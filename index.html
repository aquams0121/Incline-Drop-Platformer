<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공의 역학적 에너지 보존</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1> 공의 빗면에서의 운동(20201 강민성) </h1>
    <p>(마찰과 저항을 무시하며, 중력 가속도는 10m/s²이다.)</p>
    
    <div class="controls">
        <label>높이: </label><input type="range" id="heightSlider" min="0" max="20" value="20" step="1"> <span id="heightValue">20</span>m | 
        <label>각도: </label><input type="range" id="angleSlider" min="10" max="90" value="30" step="10"> <span id="angleValue">30</span>° |
        <label>질량: </label><input type="range" id="massSlider" min="1" max="10" value="1" step="1"> <span id="massValue">1</span>kg |
        <button id="startBtn">공 굴리기</button>
        <button id="resetBtn">초기화</button>
    </div>

    <div class="main-container">
        <!-- 시뮬레이션 화면 -->
        <canvas id="canvas" width="1000" height="600"></canvas>

        <div id="info-panel">
            <span class="title">실시간 에너지 분석</span>
            <div id="energy-display" class="energy-text">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
